<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="stylesheet" href="./styles/style.css">
    <script src="./scripts/template.js"></script>
    <script src="./scripts/script.js"></script>
</head>

<body onload="init()">
    <header id="header"></header>
    <main class="d_flex_c">
        <form class="text-center login-form">
            <h1>Log in</h1>
            <div id="email">
                <input type="email" placeholder="E-Mail" class="text-center">
                <img src="" alt="">
            </div>
            <div id="password">
                <input type="password" placeholder="Password" class="text-center">
                <img src="" alt="">
            </div>
            <div id="checkboxContainer">
                <input type="checkbox">
                <span>Remember me</span>
            </div>
            <div class="button">
                <button onclick="loginUser()">Log in</button>
                <button onclick="">Guest Log in</button>
            </div>
            <div>
                <button onclick="">Not a Join user?</button>
                <button onclick="">Sign up</button>
            </div>
        </form>
    </main>
    <footer id="footer"></footer>
</body>
</html>
