<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Join Contacts</title>
    <link rel="shortcut icon" href="./assets/icon/icon.svg" type="image/x-icon"/>
    <link rel="stylesheet" href="../styles/style.css"/>
    <link rel="stylesheet" href="../styles/flexbox.css"/>
    <link rel="stylesheet" href="../styles/base.css"/>
    <link rel="stylesheet" href="../styles/media_query.css"/>
    <link rel="stylesheet" href="../styles/pages/contacts.css"/>
    <script src="../scripts/db.js"></script>
    <script src="../scripts/contact.js"></script>
    <script src="../scripts/template.js"></script>
    <script src="../scripts/script.js"></script>
  </head>

  <body onload="loadContact()">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="app-main">
      <header class="header"></header>

      <div class="container">
          <div class="d_flex g_12">
              <div id="list-of-contacts" class="d_flex_column list-of-contacts">
                  <div class="d_flex_c_c" style="margin: 24px;">
                      <button class="w-100 bg-blue add-contact">Add contact</button>
                      <img src="../assets/img/user_add.svg" alt="contact" class="overlay-image">
                  </div>
              </div>
              <div class="d_flex" style="padding: 30px;">
                  <h1>Contacts</h1>
                  <div class="contact-separator"></div>
                  <h2 class="d_flex_c_c" style="height: 48px;">Better with a team</h2>
              </div>
          </div>
      </div>
    </main>
  </body>
</html>
