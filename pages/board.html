<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>
    <link rel="shortcut icon" href="./assets/icon/icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="../styles/pages/board.css" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/flexbox.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/media_query.css" />

    <script src="../scripts/board.js" defer></script>
    <script src="../scripts/template.js" defer></script>
    <script src="../scripts/script.js" defer></script>
  </head>

  <body class="body" onload="loadBoard()">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="app-main">
      <header class="header"></header>

      <div class="container">
        <div class="board-head">
          <h1>Board</h1>
          <div>
            <div class="board-searchBar">
              <input class="board-search-input" type="text" placeholder="Find Task" />
              <span>
                <img src="../assets/icon/search.png" alt="search icon" />
              </span>
            </div>
            <button class="board-add-task-button">
              Add Task
              <img src="../assets/icon/add.png" />
            </button>
          </div>
        </div>

        <div class="board-content">
          <div>
            <span>
              <h2>To do</h2>
              <img src="../assets/icon/plus-black.svg" alt="plus icon" />
            </span>
            <ul>
              <li class="empty-message">No tasks To do</li>
            </ul>
          </div>
          <div>
            <span>
              <h2>In progress</h2>
              <img src="../assets/icon/plus-black.svg" alt="plus icon" />
            </span>
            <ul>
              <li>
                <span class="task-category">User Story</span>
                <h3 class="task-title">Kochwelt Page & Recipe Recommender</h3>
                <p class="task-description">Build start page with recipe recommendation...</p>
              </li>
            </ul>
          </div>
          <div>
            <span>
              <h2>Await feedback</h2>
              <img src="../assets/icon/plus-black.svg" alt="plus icon" />
            </span>
            <ul>
              <li class="empty-message">No tasks for await feedback</li>
            </ul>
          </div>
          <div>
            <span>
              <h2>Done</h2>
              <img src="../assets/icon/plus-black.svg" alt="plus icon" />
            </span>
            <ul>
              <li class="empty-message">No tasks done</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
