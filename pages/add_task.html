<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Task</title>
    <link rel="shortcut icon" href="../assets/img/logo-white.png" type="image/x-icon" />
    <link rel="stylesheet" href="../styles/pages/add_task.css" />
    <link rel="stylesheet" href="../styles/pages/board.css" />
    <link rel="stylesheet" href="../styles/flexbox.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/media_query.css" />
    <script src="../scripts/db.js"></script>
    <script src="../scripts/template.js"></script>
    <script src="../scripts/priority.js"></script>
    <script src="../scripts/script.js"></script>
    <script src="../scripts/add_task.js"></script>
  </head>

  <body onload="loadTask();" class="d_flex">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="app-main" style="color: black">
      <header class="header">
      </header>

        <div id="add-task" class="container">
      
        </div>
        <div class="d_flex_c">
            <div class="d_flex buttonTaskDiv">
                <span id="required-field-big">
                    <span class="color-red">*</span>This field is required
                </span>
                <div class="d_flex g_12">
                    <button onclick="clear()" class="clear-and-create-button" style="color: black;">Clear X</button>
                    <button onclick="createNewTask();" class="bg-blue clear-and-create-button">Create Task
                        <img src="../assets/img/check.svg" alt="check">
                    </button>
                </div>
            </div>
        </div>
      </div>
    </main>
  </body>
</html>
