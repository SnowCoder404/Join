<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Login</title>
    <link rel="shortcut icon" href="./assets/icon/icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="../styles/pages/login/login.css" />
    <link rel="stylesheet" href="../styles/pages/login/login.responsive.css" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/flexbox.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <script src="./scripts/template.js"></script>
    <script src="./scripts/script.js"></script>
  </head>

  <body onload="init()">
    <header id="header"></header>
    <main class="d_flex_c">
      <div class="formDiv">
        <form class="login-form">
          <h1>Log in</h1>
          <div id="email" class="d_flex">
            <input type="email" placeholder="E-Mail" />
            <img src="" alt="" />
          </div>
          <div id="password" class="d_flex">
            <input type="password" placeholder="Password" />
            <img src="" alt="" />
          </div>
          <div id="checkboxContainer" style="text-align: initial">
            <input type="checkbox" />
            <span>Remember me</span>
          </div>
          <div class="buttonDiv">
            <button onclick="loginUser()" class="button">Log in</button>
            <button onclick="" class="button">Guest Log in</button>
          </div>
        </form>
        <div>
          <button onclick="">Not a Join user?</button>
          <button onclick="">Sign up</button>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
  </body>
</html>
